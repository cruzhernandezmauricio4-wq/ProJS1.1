<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Seguimiento de Libros - Comentarios</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Seguimiento de Libros 📚</h1>
    <form id="commentForm">
      <textarea id="commentInput" placeholder="Escribe tu comentario..." required></textarea>
      <button type="submit">Agregar Comentario</button>
    </form>
    <h2>Comentarios</h2>
    <div id="commentsList"></div>
    <button id="clearStorage">Borrar Todo (LocalStorage)</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
